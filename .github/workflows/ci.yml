name: CI

# Strict HTML validation so real markup bugs (unescaped tags like <n>, unknown
# elements, malformed structure) fail CI and the ai-dev debug->fix loop corrects them.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: index.html exists
        run: test -f index.html

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: W3C (Nu) HTML + CSS validation
        run: |
          python -m pip install --quiet html5validator
          html5validator --root . --also-check-css
